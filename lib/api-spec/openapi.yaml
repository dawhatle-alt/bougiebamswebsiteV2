openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BougieBams API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: events
    description: Events and ticketing
  - name: blog
    description: Blog / journal
  - name: subscribers
    description: Email subscribers
  - name: registrations
    description: Event registrations
  - name: contact
    description: Contact form
  - name: admin
    description: Admin management
  - name: auth
    description: Authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          description: Filter by product category
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: Unauthorized

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: List bestseller and new products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  # ── Events ────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List published events
      parameters:
        - name: category
          in: query
          description: Filter by category (In-Person, Virtual, Tournament, Workshop)
          schema:
            type: string
        - name: upcoming
          in: query
          description: When true, return only events on or after today
          schema:
            type: boolean
        - name: featured
          in: query
          description: When true, return only featured events
          schema:
            type: boolean
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event (admin)
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "401":
          description: Unauthorized

  /events/stats:
    get:
      operationId: getEventStats
      tags: [events]
      summary: Event stats summary (admin)
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Event stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStats"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /registrations:
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register for a free event (requires authentication)
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResult"
        "400":
          description: Bad request (sold out, invalid)

  /registrations/checkout:
    post:
      operationId: createRegistrationCheckout
      tags: [registrations]
      summary: Start a Stripe checkout session for paid event registration
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "200":
          description: Checkout URL or confirmation URL for free events
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
        "401":
          description: Authentication required
        "404":
          description: Event not found
        "409":
          description: Event is sold out

  /registrations/mine:
    get:
      operationId: listMyRegistrations
      tags: [registrations]
      summary: List registrations for the currently authenticated user
      security:
        - CookieAuth: []
      responses:
        "200":
          description: User registrations
          content:
            application/json:
              schema:
                type: object
                required: [registrations]
                properties:
                  registrations:
                    type: array
                    items:
                      $ref: "#/components/schemas/RegistrationRecord"
        "401":
          description: Authentication required

  /registrations/{id}:
    get:
      operationId: getRegistration
      tags: [registrations]
      summary: Get a single registration by ID
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration details
          content:
            application/json:
              schema:
                type: object
                required: [registration]
                properties:
                  registration:
                    $ref: "#/components/schemas/RegistrationRecord"
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Not found

  # ── Blog ─────────────────────────────────────────────────────────────────
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List published blog posts
      responses:
        "200":
          description: Blog posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostListResponse"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post (admin)
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostResponse"
        "401":
          description: Unauthorized

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostResponse"
        "404":
          description: Not found
    patch:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostResponse"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  # ── Coupons ───────────────────────────────────────────────────────────────
  /coupons/validate:
    get:
      operationId: validateCoupon
      tags: [subscribers]
      summary: Validate a discount coupon code
      parameters:
        - name: code
          in: query
          required: true
          description: Coupon code to validate
          schema:
            type: string
      responses:
        "200":
          description: Coupon is valid
          content:
            application/json:
              schema:
                type: object
                required: [valid, discountPercent]
                properties:
                  valid:
                    type: boolean
                  discountPercent:
                    type: number
                  message:
                    type: string
        "404":
          description: Coupon not found or invalid

  # ── Subscribers ──────────────────────────────────────────────────────────
  /subscribe:
    post:
      operationId: subscribe
      tags: [subscribers]
      summary: Subscribe to the mailing list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeResult"
        "409":
          description: Already subscribed

  /admin/subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List all subscribers (admin)
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Subscribers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberListResponse"
        "401":
          description: Unauthorized

  # ── Contact ──────────────────────────────────────────────────────────────
  /email/contact:
    post:
      operationId: sendContactEmail
      tags: [contact]
      summary: Send a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Auth ─────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user (null if not logged in)
      responses:
        "200":
          description: Current user or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    oneOf:
                      - $ref: "#/components/schemas/ApiUser"
                      - type: "null"

  /login:
    get:
      operationId: initiateLogin
      tags: [auth]
      summary: Redirect to Replit OIDC login page
      responses:
        "302":
          description: Redirect to Replit OIDC

  /callback:
    get:
      operationId: oidcCallback
      tags: [auth]
      summary: OIDC callback from Replit
      responses:
        "302":
          description: Redirect to app after successful login

  /logout:
    get:
      operationId: logout
      tags: [auth]
      summary: Log out the current user
      responses:
        "302":
          description: Redirect to home page

  # ── Storage ───────────────────────────────────────────────────────────────
  /admin/storage/upload-url:
    post:
      operationId: getUploadUrl
      tags: [admin]
      summary: Get a presigned upload URL for a file (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: ext
          in: query
          description: File extension (e.g. jpg, png, webp)
          schema:
            type: string
      responses:
        "200":
          description: Upload URL and object path
          content:
            application/json:
              schema:
                type: object
                required: [uploadURL, objectPath]
                properties:
                  uploadURL:
                    type: string
                  objectPath:
                    type: string
        "401":
          description: Unauthorized

  /admin/storage/upload/{filename}:
    put:
      operationId: uploadFile
      tags: [admin]
      summary: Upload a file to storage (admin)
      security:
        - CookieAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload success with object path
          content:
            application/json:
              schema:
                type: object
                required: [objectPath]
                properties:
                  objectPath:
                    type: string
        "401":
          description: Unauthorized

  /storage/{path}:
    get:
      operationId: getStorageFile
      tags: [admin]
      summary: Serve an uploaded file
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File contents
        "404":
          description: File not found

  # ── Product checkout ────────────────────────────────────────────────────
  /checkout:
    post:
      operationId: createCheckout
      tags: [products]
      summary: Create a Stripe checkout session for product purchase
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Stripe checkout URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: ["string", "null"]
        "400":
          description: Invalid request
        "503":
          description: Checkout not yet configured

  # ── Admin stats ──────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard summary stats (admin)
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Admin dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Session cookie set by the Replit OIDC login flow

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Product schemas ──────────────────────────────────────────────────
    ApiProduct:
      type: object
      required: [id, sku, name, description, price, category, inStock, featured]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean
        imagePath:
          type: ["string", "null"]
        featured:
          type: boolean
        affiliateUrl:
          type: ["string", "null"]

    ProductInput:
      type: object
      required: [sku, name, description, price, category, inStock]
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean

    ProductListResponse:
      type: object
      required: [products]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ApiProduct"

    ProductResponse:
      type: object
      required: [product]
      properties:
        product:
          $ref: "#/components/schemas/ApiProduct"

    # ── Event schemas ────────────────────────────────────────────────────
    ApiEvent:
      type: object
      required: [id, title, description, date, time, location, category, totalSpots, spotsLeft, host, published, featured]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        location:
          type: string
        priceCents:
          type: ["integer", "null"]
        category:
          type: string
          enum: ["In-Person", "Virtual", "Tournament", "Workshop"]
        imagePath:
          type: ["string", "null"]
        totalSpots:
          type: integer
        spotsLeft:
          type: integer
        host:
          type: string
        published:
          type: boolean
        featured:
          type: boolean
        stripeProductId:
          type: ["string", "null"]

    EventInput:
      type: object
      required: [title, description, date, time, location, category, totalSpots, spotsLeft, host]
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        location:
          type: string
        priceCents:
          type: ["integer", "null"]
        category:
          type: string
          enum: ["In-Person", "Virtual", "Tournament", "Workshop"]
        totalSpots:
          type: integer
        spotsLeft:
          type: integer
        host:
          type: string
        published:
          type: boolean

    EventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        location:
          type: string
        priceCents:
          type: ["integer", "null"]
        category:
          type: string
          enum: ["In-Person", "Virtual", "Tournament", "Workshop"]
        totalSpots:
          type: integer
        spotsLeft:
          type: integer
        host:
          type: string
        published:
          type: boolean

    EventListResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/ApiEvent"

    EventResponse:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/ApiEvent"

    EventStats:
      type: object
      required: [total, published, upcoming, totalRegistrations]
      properties:
        total:
          type: integer
        published:
          type: integer
        upcoming:
          type: integer
        totalRegistrations:
          type: integer

    # ── Registration schemas ─────────────────────────────────────────────
    RegistrationInput:
      type: object
      required: [eventId, name, email]
      properties:
        eventId:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        notes:
          type: string

    RegistrationRecord:
      type: object
      required: [id, eventId, name, email, status, createdAt]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        name:
          type: string
        email:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        createdAt:
          type: string

    RegistrationResult:
      type: object
      required: [registration]
      properties:
        registration:
          $ref: "#/components/schemas/RegistrationRecord"

    # ── Blog schemas ─────────────────────────────────────────────────────
    ApiBlogPost:
      type: object
      required: [id, slug, title, excerpt, content, category, author, published, createdAt, updatedAt]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        imagePath:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        publishedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    BlogPostInput:
      type: object
      required: [slug, title, excerpt, content, category, author]
      properties:
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        published:
          type: boolean

    BlogPostUpdate:
      type: object
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        published:
          type: boolean

    BlogPostListResponse:
      type: object
      required: [posts]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/ApiBlogPost"

    BlogPostResponse:
      type: object
      required: [post]
      properties:
        post:
          $ref: "#/components/schemas/ApiBlogPost"

    # ── Subscriber schemas ───────────────────────────────────────────────
    SubscribeInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        source:
          type: string
        discountCode:
          type: string

    SubscribeResult:
      type: object
      required: [message]
      properties:
        message:
          type: string
        discountCode:
          type: ["string", "null"]

    Subscriber:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        discountCode:
          type: ["string", "null"]
        subscribedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    SubscriberListResponse:
      type: object
      required: [subscribers]
      properties:
        subscribers:
          type: array
          items:
            $ref: "#/components/schemas/Subscriber"

    # ── Contact schemas ──────────────────────────────────────────────────
    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        subject:
          type: string
        message:
          type: string

    # ── Auth schemas ─────────────────────────────────────────────────────
    ApiUser:
      type: object
      required: [id, name, profileImage]
      properties:
        id:
          type: string
          description: Replit user ID
        name:
          type: string
          description: Display name
        profileImage:
          type: ["string", "null"]
          description: Avatar URL

    # ── Checkout schemas ─────────────────────────────────────────────────
    CheckoutItem:
      type: object
      required: [variationId, name, price, quantity]
      properties:
        variationId:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer

    CheckoutInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItem"
          minItems: 1
        email:
          type: string
          format: email
        discountCode:
          type: string

    # ── Admin stats ──────────────────────────────────────────────────────
    AdminStats:
      type: object
      required: [totalSubscribers, totalEvents, totalProducts, totalBlogPosts]
      properties:
        totalSubscribers:
          type: integer
        totalEvents:
          type: integer
        totalProducts:
          type: integer
        totalBlogPosts:
          type: integer

    # ── Shared ───────────────────────────────────────────────────────────
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
