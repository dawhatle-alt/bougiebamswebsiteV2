kind = "mobile"
previewPath = "/mobile/"
title = "BougieBams Mobile"
version = "1.0.0"
id = "artifacts/bougiebams-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22468

[services.development]
run = "pnpm --filter @workspace/bougiebams-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bougiebams-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bougiebams-mobile", "run", "serve" ]

[services.env]
PORT = "22468"
BASE_PATH = "/mobile/"
